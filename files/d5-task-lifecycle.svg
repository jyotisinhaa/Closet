<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="ar5" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1A1612"/>
    </marker>
  </defs>

  <rect width="1000" height="500" fill="#FBF8F1"/>

  <text x="500" y="36" text-anchor="middle" font-size="20" font-weight="600" fill="#1A1612">Perfect Corp Task Lifecycle</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" font-style="italic" fill="#8C8273">Every render goes through these states — your polling logic handles all of them</text>

  <!-- Start -->
  <circle cx="60" cy="240" r="10" fill="#1A1612"/>

  <!-- Submitted -->
  <g>
    <rect x="130" y="215" width="140" height="50" rx="25" fill="#F4EFE6" stroke="#1A1612" stroke-width="1.5"/>
    <text x="200" y="246" text-anchor="middle" font-size="13" font-weight="600" fill="#1A1612">Submitted</text>
  </g>

  <!-- Running -->
  <g>
    <rect x="340" y="215" width="140" height="50" rx="25" fill="#EBE3D4" stroke="#C2563A" stroke-width="1.5"/>
    <text x="410" y="246" text-anchor="middle" font-size="13" font-weight="600" fill="#1A1612">Running</text>
  </g>

  <!-- Success -->
  <g>
    <rect x="600" y="135" width="140" height="50" rx="25" fill="#5B6A3F" stroke="#5B6A3F" stroke-width="1.5"/>
    <text x="670" y="166" text-anchor="middle" font-size="13" font-weight="600" fill="#FBF8F1">Success</text>
  </g>

  <!-- Error -->
  <g>
    <rect x="600" y="225" width="140" height="50" rx="25" fill="#C2563A" stroke="#C2563A" stroke-width="1.5"/>
    <text x="670" y="256" text-anchor="middle" font-size="13" font-weight="600" fill="#FBF8F1">Error</text>
  </g>

  <!-- Timeout -->
  <g>
    <rect x="600" y="315" width="140" height="50" rx="25" fill="#9A3E26" stroke="#9A3E26" stroke-width="1.5"/>
    <text x="670" y="346" text-anchor="middle" font-size="13" font-weight="600" fill="#FBF8F1">Timeout</text>
  </g>

  <!-- End -->
  <g>
    <circle cx="880" cy="240" r="14" fill="none" stroke="#1A1612" stroke-width="1.5"/>
    <circle cx="880" cy="240" r="8" fill="#1A1612"/>
  </g>

  <!-- Arrows -->
  <!-- start -> Submitted -->
  <line x1="70" y1="240" x2="125" y2="240" stroke="#1A1612" stroke-width="1.5" marker-end="url(#ar5)"/>
  <text x="98" y="232" text-anchor="middle" font-size="9" fill="#3A322A" font-style="italic">POST</text>

  <!-- Submitted -> Running -->
  <line x1="275" y1="240" x2="335" y2="240" stroke="#1A1612" stroke-width="1.5" marker-end="url(#ar5)"/>
  <text x="305" y="232" text-anchor="middle" font-size="9" fill="#3A322A" font-style="italic">task_id</text>

  <!-- Running -> Running (self-loop poll) -->
  <path d="M 360 215 Q 360 180 410 180 Q 460 180 460 215" fill="none" stroke="#1A1612" stroke-width="1.2" marker-end="url(#ar5)"/>
  <text x="410" y="173" text-anchor="middle" font-size="9" fill="#3A322A" font-style="italic">poll every 3s · running</text>

  <!-- Running -> Success -->
  <line x1="485" y1="225" x2="595" y2="170" stroke="#5B6A3F" stroke-width="1.5" marker-end="url(#ar5)"/>
  <text x="540" y="190" font-size="10" fill="#5B6A3F" font-weight="600">~15-25s</text>

  <!-- Running -> Error -->
  <line x1="485" y1="240" x2="595" y2="245" stroke="#C2563A" stroke-width="1.5" marker-end="url(#ar5)"/>
  <text x="538" y="237" font-size="9" fill="#C2563A" font-style="italic">error_download_image, etc.</text>

  <!-- Running -> Timeout -->
  <line x1="485" y1="260" x2="595" y2="335" stroke="#9A3E26" stroke-width="1.5" marker-end="url(#ar5)"/>
  <text x="540" y="320" font-size="9" fill="#9A3E26" font-style="italic">&gt; 60s</text>

  <!-- Success -> End -->
  <line x1="745" y1="170" x2="868" y2="232" stroke="#1A1612" stroke-width="1.5" marker-end="url(#ar5)"/>
  <text x="820" y="190" font-size="9" fill="#3A322A" font-style="italic">save url, dst_id</text>

  <!-- Error -> End -->
  <line x1="745" y1="248" x2="865" y2="244" stroke="#1A1612" stroke-width="1.5" marker-end="url(#ar5)"/>
  <text x="805" y="240" font-size="9" fill="#3A322A" font-style="italic">user-friendly error</text>

  <!-- Timeout -> End -->
  <line x1="745" y1="335" x2="868" y2="252" stroke="#1A1612" stroke-width="1.5" marker-end="url(#ar5)"/>
  <text x="820" y="320" font-size="9" fill="#3A322A" font-style="italic">abort, surface error</text>

  <!-- Polling rules box -->
  <g>
    <rect x="160" y="395" width="680" height="80" rx="8" fill="#EBE3D4" stroke="#3A322A"/>
    <text x="180" y="418" font-size="12" font-weight="600" fill="#1A1612">Polling rules for the dev:</text>
    <text x="180" y="438" font-size="11" fill="#3A322A">· Start polling 2s after the initial POST · Poll every 3s · Abort after 60s</text>
    <text x="180" y="455" font-size="11" fill="#3A322A">· On success: cache the result URL — never re-render the same combination</text>
    <text x="180" y="472" font-size="11" fill="#3A322A">· On error: show user-friendly message, let them retry · Result URL lives ~2 hours, download to keep longer</text>
  </g>
</svg>
